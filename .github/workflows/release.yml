name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    environment: prod
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Échec immédiat si le tag ne correspond pas à package.json : sinon le
      # build complet tourne pour rien et l'upload échoue (noms d'assets basés
      # sur le tag, fichiers nommés d'après package.json)
      - name: Check tag matches package.json version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "Le tag v$tag ne correspond pas a la version package.json ($pkg)"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write server env file
        shell: pwsh
        run: |
          "TRN_API_KEY=${{ secrets.TRN_API_KEY }}" | Out-File -FilePath server/.env -Encoding utf8NoBOM

      - name: Build
        env:
          VITE_DISCORD_WEBHOOK_KEY: ${{ secrets.DISCORD_WEBHOOK_KEY }}
        run: npm run clean && npm run build && npx electron-builder --win --publish never

      - name: Create draft release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          gh release create "${{ github.ref_name }}" `
            --title "$version" `
            --draft `
            "release/RL-Overlay-Setup-${version}.exe" `
            "release/RL-Overlay-Setup-${version}.exe.blockmap" `
            "release/latest.yml"
